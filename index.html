<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Cevro Signature Generator</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.wrapper{
display:flex;
height:100vh;
}

.form{
width:40%;
background:white;
padding:40px;
box-shadow:2px 0px 10px rgba(0,0,0,0.1);
}

.preview{
width:60%;
display:flex;
align-items:center;
justify-content:center;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
}

h2{
margin-top:0;
}

.signature-box{
background:white;
padding:20px;
border:1px solid #ddd;
}

</style>

</head>

<body>

<div class="wrapper">

<div class="form">

<h2>Cevro Signature</h2>

<input id="name" placeholder="Full Name" oninput="generate()">

<input id="title" placeholder="Job Title" oninput="generate()">

<input id="phone" placeholder="Phone" oninput="generate()">

<input id="linkedin" placeholder="LinkedIn URL" oninput="generate()">

<input id="calendar" placeholder="Calendar link" oninput="generate()">

</div>


<div class="preview">

<div class="signature-box" id="signature"></div>

</div>

</div>


<script>

function generate(){

const name=document.getElementById("name").value
const title=document.getElementById("title").value
const phone=document.getElementById("phone").value
const linkedin=document.getElementById("linkedin").value
const calendar=document.getElementById("calendar").value

document.getElementById("signature").innerHTML=`

<table style="font-family:Arial;font-size:14px">

<tr>
<td colspan="2">
<a href="${calendar}">Book a call</a>
</td>
</tr>

<tr>
<td colspan="2" style="padding-top:10px">

<strong>${name}</strong> | ${title}<br>

m: ${phone}<br>

<a href="https://cevro.ai">cevro.ai</a><br>

<a href="${linkedin}">${name} LinkedIn</a>

</td>
</tr>

<tr>

<td style="padding-top:10px">

<img src="https://raw.githubusercontent.com/lidor1997/cevro-signature-generator/main/logo.png" width="120">

</td>

</tr>

</table>

`

}

generate()

</script>

</body>

</html>
