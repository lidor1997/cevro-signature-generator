<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cevro | Signature Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5b2bbf;
            --bg-gradient: linear-gradient(135deg, #f5f3ff 0%, #ffffff 100%);
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            display: flex;
            width: 1100px;
            height: 800px;
            background: #ffffff;
            border-radius: 30px;
            box-shadow: 0 40px 100px -20px rgba(91, 43, 191, 0.15);
            overflow: hidden;
        }

        .editor-side {
            width: 380px;
            padding: 40px;
            border-right: 1px solid var(--border);
            overflow-y: auto;
        }

        .section-label {
            font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
            color: #64748b; margin: 30px 0 15px 0; display: block; border-bottom: 1px solid var(--border); padding-bottom: 8px;
        }

        .field { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #475569; }

        input, select {
            width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 12px;
            font-size: 14px; background: #f8fafc; outline: none;
        }

        input:focus { border-color: var(--primary); background: #fff; }

        .preview-side { flex: 1; background: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .signature-wrapper {
            background: white; padding: 40px; border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            user-select: all; /* Makes copying easier */
        }

        .copy-button {
            margin-top: 40px; background: var(--primary); color: white; border: none; padding: 18px 40px;
            border-radius: 50px; font-weight: 700; cursor: pointer; transition: 0.3s;
        }

        .copy-button:hover { transform: translateY(-2px); opacity: 0.9; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="editor-side">
        <div style="font-size: 24px; font-weight: 800; color: var(--primary); margin-bottom: 20px;">Cevro Studio</div>

        <span class="section-label">Identity</span>
        <div class="field"><label>Full Name</label><input type="text" id="name" placeholder="John Doe" oninput="generate()"></div>
        <div class="field"><label>Job Title</label><input type="text" id="title" placeholder="Position" oninput="generate()"></div>
        
        <div class="field">
            <label>Phone Number</label>
            <div style="display:flex; gap:8px;">
                <select id="prefix" onchange="generate()" style="width:100px;">
                    <option value="+972">IL (+972)</option>
                    <option value="+381">RS (+381)</option>
                    <option value="+1">US (+1)</option>
                    <option value="+44">UK (+44)</option>
                    </select>
                <input type="text" id="phone" placeholder="50 000 000" oninput="generate()">
            </div>
        </div>

        <span class="section-label">Links</span>
        <div class="field"><label>LinkedIn URL</label><input type="text" id="linkedin" placeholder="https://..." oninput="generate()"></div>
        <div class="field"><label>Calendar Link</label><input type="text" id="calendar" placeholder="https://..." oninput="generate()"></div>

        <span class="section-label">Logo Size</span>
        <input type="range" id="logoWidth" min="40" max="180" value="100" oninput="generate()">
    </div>

    <div class="preview-side">
        <div id="signature-output" class="signature-wrapper"></div>
        <button class="copy-button" onclick="copyToClipboard()">Copy to Clipboard</button>
    </div>
</div>

<script>
    function generate() {
        const name = document.getElementById('name').value || "Your Name";
        const title = document.getElementById('title').value || "Your Position";
        const phone = document.getElementById('phone').value;
        const prefix = document.getElementById('prefix').value;
        const linkedin = document.getElementById('linkedin').value;
        const calendar = document.getElementById('calendar').value;
        const logoWidth = document.getElementById('logoWidth').value;

        const logoUrl = "https://raw.githubusercontent.com/lidor1997/cevro-signature-generator/06d880fec1752804a8f64b013d5c7382455fc7eb/1763362497422%20(1).png";

        const phoneBlock = phone ? `
            <div style="font-size: 13px; color: #475569; margin-bottom: 4px;">
                <span style="color: #5b2bbf; font-weight: 700;">M:</span> ${prefix} ${phone}
            </div>` : '';

        const linkedinIcon = linkedin ? `
            <a href="${linkedin}" target="_blank" style="margin-left: 10px; text-decoration: none; display: inline-block;">
                <img src="https://cdn-icons-png.flaticon.com/32/174/174857.png" width="16" height="16" style="display: block; pointer-events: none;">
            </a>` : '';

        const calendarBtn = calendar ? `
            <div style="margin-top: 15px;">
                <a href="${calendar}" target="_blank" style="background-color: #000; color: #ffffff; padding: 8px 18px; text-decoration: none; border-radius: 6px; font-size: 12px; font-weight: 700; display: inline-block;">Schedule a Call</a>
            </div>` : '';

        // The Signature Template
        const template = `
            <table cellpadding="0" cellspacing="0" style="font-family: 'Inter', Helvetica, Arial, sans-serif; color: #1e293b; border-collapse: collapse;">
                <tr>
                    <td style="padding-right: 25px; border-right: 2px solid #5b2bbf; vertical-align: middle;">
                        <img src="${logoUrl}" width="${logoWidth}" alt="Cevro" style="display: block; border: 0; pointer-events: none; -webkit-user-drag: none;">
                    </td>
                    <td style="padding-left: 25px; vertical-align: middle; white-space: nowrap;">
                        <div style="font-weight: 700; color: #000000; font-size: 19px; line-height: 1.2; margin-bottom: 2px;">${name}</div>
                        <div style="color: #64748b; font-weight: 500; font-size: 14px; margin-bottom: 12px;">${title}</div>
                        ${phoneBlock}
                        <div style="font-size: 13px; display: flex; align-items: center;">
                            <a href="https://www.cevro.ai" target="_blank" style="color: #5b2bbf; text-decoration: none; font-weight: 700;">www.cevro.ai</a>
                            ${linkedinIcon}
                        </div>
                        ${calendarBtn}
                    </td>
                </tr>
            </table>
        `;

        document.getElementById('signature-output').innerHTML = template;
    }

    function copyToClipboard() {
        const node = document.getElementById("signature-output");
        const range = document.createRange();
        range.selectNode(node);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand("copy");
        alert("Signature copied! Paste into Gmail/Outlook.");
    }

    generate();
</script>

</body>
</html>
