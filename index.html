<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cevro | Premium Signature Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5b2bbf;
            --bg-gradient: linear-gradient(135deg, #f3e8ff 0%, #ffffff 100%);
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            display: flex;
            width: 1200px;
            height: 850px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            border-radius: 32px;
            box-shadow: 0 40px 100px -20px rgba(91, 43, 191, 0.15);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.6);
            position: relative;
        }

        .editor-side {
            width: 380px;
            padding: 40px;
            border-right: 1px solid var(--border);
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.9);
        }

        .logo-header { font-size: 24px; font-weight: 800; margin-bottom: 30px; color: var(--primary); letter-spacing: -1px; }

        .section-label {
            font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
            color: #64748b; margin: 30px 0 15px 0; display: block; border-bottom: 1px solid var(--border); padding-bottom: 8px;
        }

        .field { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #475569; }

        input, select {
            width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 12px;
            font-size: 14px; background: #f8fafc; transition: 0.2s ease; outline: none;
        }

        input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(91, 43, 191, 0.1); }

        .preview-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .signature-wrapper {
            padding: 20px 25px; 
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            max-width: 480px;
            width: fit-content;
            background: linear-gradient(135deg, #fdfaff 0%, #ffffff 100%);
        }

        #toast {
            position: absolute;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 16px 24px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            opacity: 0;
        }

        #toast.show { bottom: 40px; opacity: 1; }
        .toast-check { background: #10b981; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; }

        .controls { margin-top: 30px; display: flex; gap: 15px; }
        .btn { border: none; padding: 16px 32px; border-radius: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .copy-button { background: var(--primary); color: white; }

        input[type="range"] { height: 6px; background: #e2e8f0; border-radius: 5px; appearance: none; cursor: pointer; width: 100%; }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 20px; height: 20px; background: var(--primary); border: 3px solid white; border-radius: 50%; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="toast">
        <div class="toast-check">✓</div>
        <div>
            <div style="font-weight: 700; font-size: 14px;">Copied Successfully!</div>
            <div style="font-size: 12px; color: #94a3b8;">Paste it into your Email settings.</div>
        </div>
    </div>

    <div class="editor-side">
        <div class="logo-header">Cevro Studio</div>
        <span class="section-label">Identity</span>
        <div class="field"><label>Full Name</label><input type="text" id="name" placeholder="John Doe" oninput="generate()"></div>
        <div class="field"><label>Job Title</label><input type="text" id="title" placeholder="Creative Director" oninput="generate()"></div>
        
        <span class="section-label">Contact</span>
        <div class="field">
            <label>Phone Number</label>
            <div style="display:flex; gap:10px;">
                <select id="prefix" onchange="generate()" style="width:115px;">
                    <option value="+1" selected>US (+1)</option>
                    <option value="+43">AT (+43)</option>
                    <option value="+32">BE (+32)</option>
                    <option value="+41">CH (+41)</option>
                    <option value="+420">CZ (+420)</option>
                    <option value="+49">DE (+49)</option>
                    <option value="+45">DK (+45)</option>
                    <option value="+34">ES (+34)</option>
                    <option value="+358">FI (+358)</option>
                    <option value="+33">FR (+33)</option>
                    <option value="+30">GR (+30)</option>
                    <option value="+36">HU (+36)</option>
                    <option value="+353">IE (+353)</option>
                    <option value="+972">IL (+972)</option>
                    <option value="+39">IT (+39)</option>
                    <option value="+31">NL (+31)</option>
                    <option value="+47">NO (+47)</option>
                    <option value="+48">PL (+48)</option>
                    <option value="+351">PT (+351)</option>
                    <option value="+40">RO (+40)</option>
                    <option value="+381">RS (+381)</option>
                    <option value="+46">SE (+46)</option>
                    <option value="+44">UK (+44)</option>
                </select>
                <input type="text" id="phone" placeholder="555-0123" oninput="generate()">
            </div>
        </div>
        <div class="field"><label>LinkedIn URL</label><input type="text" id="linkedin" placeholder="LinkedIn link" oninput="generate()"></div>

        <span class="section-label">Design & Scale</span>
        <div class="field">
            <label>Global Scale: <span id="scaleVal">100</span>%</label>
            <input type="range" id="globalScale" min="70" max="140" value="100" oninput="generate()">
        </div>
        <div class="field">
            <label>Accent Color</label>
            <select id="accentColor" onchange="generate()">
                <option value="#5b2bbf">Cevro Purple</option>
                <option value="#000000">Cevro Black</option>
            </select>
        </div>
    </div>

    <div class="preview-side">
        <div id="signature-output" class="signature-wrapper"></div>
    </div>
</div>

<script>
    function generate() {
        const name = document.getElementById('name').value || "Lidor Kupershmid";
        const title = document.getElementById('title').value || "AI Engineer";
        const phone = document.getElementById('phone').value;
        const prefix = document.getElementById('prefix').value;
        const linkedin = document.getElementById('linkedin').value;
        const color = document.getElementById('accentColor').value;
        const scale = document.getElementById('globalScale').value / 100;

        document.getElementById('scaleVal').innerText = Math.round(scale * 100);

        const logoWidth = 125 * scale; 
        const nameSize = 20 * scale;
        const titleSize = 14 * scale;
        const textSize = 13 * scale;
        const padding = 15 * scale;

        const logoUrl = "https://raw.githubusercontent.com/lidor1997/cevro-signature-generator/06d880fec1752804a8f64b013d5c7382455fc7eb/1763362497422%20(1).png";
        
        const phoneHtml = phone ? `
            <tr><td style="padding-bottom: ${4 * scale}px; font-family: sans-serif; font-size: ${textSize}px; color: #4b5563; border: none !important;">
                <span style="color: ${color}; font-weight: 800; font-size: ${textSize - 2}px; margin-right: 4px;">M:</span> ${prefix} ${phone}
            </td></tr>` : '';

        const linkedinIcon = linkedin ? `
            <a href="${linkedin}" target="_blank" style="text-decoration:none; margin-left: ${8 * scale}px; display: inline-block; vertical-align: middle;">
                <img src="https://cdn-icons-png.flaticon.com/32/174/174857.png" width="${16 * scale}" height="${16 * scale}" style="display:block; border:0;">
            </a>` : '';

        const template = `
            <table cellpadding="0" cellspacing="0" border="0" style="vertical-align: middle; border-collapse: collapse !important; background: linear-gradient(135deg, #fdfaff 0%, #ffffff 100%); background-color: #ffffff; border: none !important; margin: 0; padding: 0;">
                <tbody><tr style="border: none !important;">
                    <td style="padding-right: ${padding}px; border-right: 2px solid ${color} !important; vertical-align: middle; border-top: none !important; border-bottom: none !important; border-left: none !important;">
                        <img src="${logoUrl}" width="${logoWidth}" alt="Cevro" style="display: block; border: 0; pointer-events: none;">
                    </td>
                    <td style="padding-left: ${padding}px; vertical-align: middle; white-space: nowrap; border: none !important;">
                        <table cellpadding="0" cellspacing="0" border="0" style="border-collapse: collapse !important; border: none !important; margin: 0; padding: 0;">
                            <tbody>
                                <tr style="border: none !important;"><td style="font-family: sans-serif; font-weight: 700; color: #010101; font-size: ${nameSize}px; line-height: 1.2; padding-bottom: 2px; border: none !important;">${name}</td></tr>
                                <tr style="border: none !important;"><td style="font-family: sans-serif; color: #64748b; font-weight: 500; font-size: ${titleSize}px; padding-bottom: ${8 * scale}px; border: none !important;">${title}</td></tr>
                                ${phoneHtml}
                                <tr style="border: none !important;"><td style="padding-top: ${2 * scale}px; font-family: sans-serif; font-size: ${textSize}px; border: none !important;">
                                    <a href="https://www.cevro.ai" target="_blank" style="color: ${color}; text-decoration: none; font-weight: 700;">www.cevro.ai</a>
                                    ${linkedinIcon}
                                </td></tr>
                            </tbody>
                        </table>
                    </td>
                </tr></tbody>
            </table>
        `;
        document.getElementById('signature-output').innerHTML = template;
    }

    generate();
</script>
</body>
</html>
