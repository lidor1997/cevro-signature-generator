<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cevro | Ultimate Signature Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5b2bbf;
            --primary-light: #9d72ff;
            --bg-gradient: linear-gradient(135deg, #f5f3ff 0%, #ffffff 100%);
            --card: #ffffff;
            --border: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            display: flex;
            width: 1200px;
            height: 850px;
            background: var(--card);
            border-radius: 30px;
            box-shadow: 0 40px 100px -20px rgba(91, 43, 191, 0.15);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.8);
            position: relative;
        }

        .editor-side {
            width: 380px;
            padding: 40px;
            border-right: 1px solid var(--border);
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.95);
        }

        .logo-header { font-size: 24px; font-weight: 800; margin-bottom: 30px; color: var(--primary); letter-spacing: -1px; }

        .section-label {
            font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
            color: var(--text-muted); margin: 30px 0 15px 0; display: block; border-bottom: 1px solid var(--border); padding-bottom: 8px;
        }

        .field { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #475569; }

        input, select {
            width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 12px;
            font-size: 14px; background: #f8fafc; transition: all 0.25s ease; outline: none;
        }

        input:focus, select:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(91, 43, 191, 0.1); }

        .phone-row { display: flex; gap: 10px; }
        .phone-row select { width: 120px; }

        .preview-side {
            flex: 1;
            background: #f1f5f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .preview-side.dark-mode { background: #121212; }

        .signature-wrapper {
            background: white;
            padding: 45px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            max-width: 580px;
            width: 100%;
            border: 1px solid #f1f5f9;
            transition: all 0.4s ease;
        }

        .dark-mode .signature-wrapper { background: #1e1e1e; border-color: #333; }
        .dark-mode .sig-name { color: #ffffff !important; }
        .dark-mode .sig-title { color: #94a3b8 !important; }
        .dark-mode .sig-phone { color: #cbd5e1 !important; }

        #toast {
            position: absolute;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 16px 24px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            opacity: 0;
        }

        #toast.show { bottom: 40px; opacity: 1; }
        .toast-check { background: #10b981; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; }

        .controls { margin-top: 30px; display: flex; gap: 15px; }
        .btn { border: none; padding: 16px 32px; border-radius: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s ease; }
        .copy-button { background: var(--primary); color: white; box-shadow: 0 10px 25px -5px rgba(91, 43, 191, 0.4); }
        .dark-mode-toggle { background: #475569; color: white; }

        input[type="range"] { height: 6px; background: #e2e8f0; border-radius: 5px; appearance: none; cursor: pointer; width: 100%; }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 20px; height: 20px; background: var(--primary); border: 3px solid white; border-radius: 50%; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="toast">
        <div class="toast-check">✓</div>
        <div>
            <div style="font-weight: 700; font-size: 14px;">Copied Successfully!</div>
            <div style="font-size: 12px; color: #94a3b8;">Paste it in Gmail settings.</div>
        </div>
    </div>

    <div class="editor-side">
        <div class="logo-header">Cevro Studio</div>

        <span class="section-label">Identity</span>
        <div class="field"><label>Full Name</label><input type="text" id="name" placeholder="John Doe" oninput="generate()"></div>
        <div class="field"><label>Job Title</label><input type="text" id="title" placeholder="Creative Director" oninput="generate()"></div>
        <div class="field">
            <label>Phone Number</label>
            <div class="phone-row">
                <select id="prefix" onchange="generate()">
                    <option value="+43">AT (+43)</option>
                    <option value="+32">BE (+32)</option>
                    <option value="+41">CH (+41)</option>
                    <option value="+420">CZ (+420)</option>
                    <option value="+49">DE (+49)</option>
                    <option value="+45">DK (+45)</option>
                    <option value="+34">ES (+34)</option>
                    <option value="+358">FI (+358)</option>
                    <option value="+33">FR (+33)</option>
                    <option value="+30">GR (+30)</option>
                    <option value="+36">HU (+36)</option>
                    <option value="+353">IE (+353)</option>
                    <option value="+972" selected>IL (+972)</option>
                    <option value="+39">IT (+39)</option>
                    <option value="+31">NL (+31)</option>
                    <option value="+47">NO (+47)</option>
                    <option value="+48">PL (+48)</option>
                    <option value="+351">PT (+351)</option>
                    <option value="+40">RO (+40)</option>
                    <option value="+381">RS (+381)</option>
                    <option value="+46">SE (+46)</option>
                    <option value="+44">UK (+44)</option>
                    <option value="+1">US (+1)</option>
                </select>
                <input type="text" id="phone" placeholder="50 000 000" oninput="generate()">
            </div>
        </div>

        <span class="section-label">Connections</span>
        <div class="field"><label>LinkedIn URL</label><input type="text" id="linkedin" placeholder="LinkedIn profile link" oninput="generate()"></div>
        <div class="field"><label>Meeting Link</label><input type="text" id="calendar" placeholder="Calendly or Meet link" oninput="generate()"></div>

        <span class="section-label">Design & Scale</span>
        <div class="field">
            <label>Font Family</label>
            <select id="fontFamily" onchange="generate()">
                <option value="'Inter', sans-serif">Inter (Modern)</option>
                <option value="'Calibri', 'Candara', sans-serif">Calibri (Business)</option>
                <option value="Arial, sans-serif">Arial (Standard)</option>
            </select>
        </div>
        <div class="field">
            <label>Accent Color</label>
            <select id="accentColor" onchange="generate()">
                <option value="#5b2bbf">Cevro Purple</option>
                <option value="#000000">Cevro Black</option>
            </select>
        </div>
        <div class="field">
            <label>Global Scale: <span id="scaleVal">100</span>%</label>
            <input type="range" id="globalScale" min="70" max="140" value="100" oninput="generate()">
        </div>
    </div>

    <div class="preview-side" id="previewPane">
        <div id="signature-output" class="signature-wrapper"></div>
        <div class="controls">
            <button class="btn copy-button" onclick="copyToClipboard()">Copy Signature</button>
            <button class="btn dark-mode-toggle" onclick="toggleDarkMode()">Night Mode</button>
        </div>
    </div>
</div>

<script>
    function generate() {
        const name = document.getElementById('name').value || "John Doe";
        const title = document.getElementById('title').value || "Creative Director";
        const phone = document.getElementById('phone').value;
        const prefix = document.getElementById('prefix').value;
        const linkedin = document.getElementById('linkedin').value;
        const calendar = document.getElementById('calendar').value;
        const color = document.getElementById('accentColor').value;
        const font = document.getElementById('fontFamily').value;
        const scale = document.getElementById('globalScale').value / 100;

        document.getElementById('scaleVal').innerText = Math.round(scale * 100);

        const logoWidth = 135 * scale; 
        const nameSize = 20 * scale;
        const titleSize = 14 * scale;
        const textSize = 13 * scale;

        const logoUrl = "https://raw.githubusercontent.com/lidor1997/cevro-signature-generator/06d880fec1752804a8f64b013d5c7382455fc7eb/1763362497422%20(1).png";
        
        const phoneHtml = phone ? `
            <tr><td class="sig-phone" style="padding-bottom: ${4 * scale}px; font-family: ${font}; font-size: ${textSize}px; color: #334155;">
                <span style="color: ${color}; font-weight: 800; font-size: ${textSize - 2}px; margin-right: 4px;">M:</span> ${prefix} ${phone}
            </td></tr>` : '';

        const linkedinIcon = linkedin ? `
            <a href="${linkedin}" target="_blank" style="text-decoration:none; margin-left: ${8 * scale}px; display: inline-block; vertical-align: middle;">
                <img src="https://cdn-icons-png.flaticon.com/32/174/174857.png" width="${16 * scale}" height="${16 * scale}" style="display:block; border:0; pointer-events: none;">
            </a>` : '';

        const calendarBtn = calendar ? `
            <tr><td style="padding-top: ${15 * scale}px;">
                <a href="${calendar}" target="_blank" style="background-color: ${color}; color: #ffffff; padding: ${8 * scale}px ${18 * scale}px; text-decoration: none; border-radius: 6px; font-size: ${textSize - 1}px; font-weight: 700; display: inline-block;">Schedule a Call</a>
            </td></tr>` : '';

        const template = `
            <table cellpadding="0" cellspacing="0" style="vertical-align: middle; border-collapse: collapse !important;">
                <tbody><tr>
                    <td style="padding-right: ${25 * scale}px; border-right: 2px solid ${color}; vertical-align: middle;">
                        <img src="${logoUrl}" width="${logoWidth}" alt="Cevro" style="display: block; border: 0; pointer-events: none; -webkit-user-drag: none;">
                    </td>
                    <td style="padding-left: ${25 * scale}px; vertical-align: middle;">
                        <table cellpadding="0" cellspacing="0" style="border-collapse: collapse !important;">
                            <tbody>
                                <tr><td class="sig-name" style="font-family: ${font}; font-weight: 700; color: #000; font-size: ${nameSize}px; padding-bottom: 2px;">${name}</td></tr>
                                <tr><td class="sig-title" style="font-family: ${font}; color: #64748b; font-weight: 500; font-size: ${titleSize}px; padding-bottom: ${12 * scale}px;">${title}</td></tr>
                                ${phoneHtml}
                                <tr><td style="padding-top: ${4 * scale}px; font-family: ${font}; font-size: ${textSize}px;">
                                    <a class="sig-web" href="https://www.cevro.ai" target="_blank" style="color: ${color}; text-decoration: none; font-weight: 700;">www.cevro.ai</a>
                                    ${linkedinIcon}
                                </td></tr>
                                ${calendarBtn}
                            </tbody>
                        </table>
                    </td>
                </tr></tbody>
            </table>
        `;
        document.getElementById('signature-output').innerHTML = template;
    }

    function toggleDarkMode() {
        const pane = document.getElementById('previewPane');
        pane.classList.toggle('dark-mode');
        document.querySelector('.dark-mode-toggle').innerText = pane.classList.contains('dark-mode') ? "Light Mode" : "Night Mode";
    }

    function copyToClipboard() {
        const node = document.getElementById("signature-output");
        const range = document.createRange();
        range.selectNode(node);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand("copy");
        
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 4000);
    }

    generate();
</script>

</body>
</html>
